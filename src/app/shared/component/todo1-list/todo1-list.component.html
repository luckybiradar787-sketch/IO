<!-- <p>todo1-list works!</p> -->


<ul class="list-group mt-5" *ngIf="getTodos.length>0;else notodos">
    <li *ngFor="let todo of getTodos" class="list-group-item  d-flex justify-content-between align-items-center" >
       <strong> {{todo.todoItem}}
</strong>
        <div>
            <button
            (click)="onEdit(todo)"
            mat-mini-fab color="primary" class="mr-2"><mat-icon>edit</mat-icon></button>
            <button
            (click)="onTodoRemove(todo.todoId)"
            mat-mini-fab color="warn"><mat-icon>delete</mat-icon></button>
        </div>
    </li>
</ul>

<ng-template #notodos>
    <p class="alert alert primary"> No Todos !!!</p>
</ng-template>
