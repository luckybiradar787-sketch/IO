
<ul class="list-group mt-5" *ngIf="getTodos.length >0; else noTodos">
    <li class="list-group-item d-flex justify-content-between" *ngFor="let todo of getTodos">
        <strong>{{todo.todoItem}}</strong>
        
    <div>
        <button mat-raised-button color="primary" class="mr-2">Edit</button>
        <button mat-raised-button color="warn">Remove</button>
    </div>
    </li>
</ul>

<ng-template #noTodos>
  <p class="alert alert-info">
    No Todos!!!
  </p>
</ng-template>
